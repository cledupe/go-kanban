services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    working_dir: /workspace/backend
    command: ["go", "run", "./cmd/api"]
    environment:
      HOST: 0.0.0.0
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/workspace/backend
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod

  backend-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: test

volumes:
  go-build-cache:
  go-mod-cache:
